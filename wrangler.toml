name = "superplacestudy"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
pages_build_output_dir = "out"

# Cloudflare Pages Functions AI 바인딩
[env.production]
ai = { binding = "AI" }

[[env.production.d1_databases]]
binding = "DB"
database_name = "webapp-production"
database_id = "8c106540-21b4-4fa9-8879-c4956e459ca1"

[[env.production.r2_buckets]]
binding = "SMS_DOCUMENTS"
bucket_name = "superplacestudy"

[[env.production.r2_buckets]]
binding = "SENDER_NUMBER_BUCKET"
bucket_name = "superplacestudy"

[[env.production.vectorize]]
binding = "VECTORIZE"
index_name = "knowledge-base-embeddings"

[env.preview]
ai = { binding = "AI" }

[[env.preview.d1_databases]]
binding = "DB"
database_name = "webapp-production"
database_id = "8c106540-21b4-4fa9-8879-c4956e459ca1"

[[env.preview.r2_buckets]]
binding = "SMS_DOCUMENTS"
bucket_name = "superplacestudy"

[[env.preview.r2_buckets]]
binding = "SENDER_NUMBER_BUCKET"
bucket_name = "superplacestudy"

[[env.preview.vectorize]]
binding = "VECTORIZE"
index_name = "knowledge-base-embeddings"
