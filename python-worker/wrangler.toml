name = "physonsuperplacestudy"
main = "worker.js"
compatibility_date = "2024-01-01"

# Cloudflare AI 바인딩
[ai]
binding = "AI"

# Vectorize 바인딩 (RAG용)
[[vectorize]]
binding = "VECTORIZE"
index_name = "ai-chatbot-knowledge"

[env.production]
vars = { ENVIRONMENT = "production" }

[[env.production.vectorize]]
binding = "VECTORIZE"
index_name = "ai-chatbot-knowledge"

[vars]
ENVIRONMENT = "development"
