<!DOCTYPE html>
<html>
<head>
  <title>랜딩페이지 DB 마이그레이션</title>
  <style>
    body { font-family: system-ui; padding: 40px; max-width: 800px; margin: 0 auto; }
    button { background: #007bff; color: white; border: none; padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 4px; }
    button:hover { background: #0056b3; }
    .result { margin-top: 20px; padding: 20px; border: 2px solid #ddd; border-radius: 8px; background: #f9f9f9; }
    .success { border-color: #28a745; background: #d4edda; }
    .error { border-color: #dc3545; background: #f8d7da; }
    pre { background: white; padding: 10px; border-radius: 4px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🔧 랜딩페이지 테이블 마이그레이션</h1>
  <p>이 페이지는 <code>landing_pages</code> 테이블에 <code>thumbnail_url</code>과 <code>subtitle</code> 컬럼을 추가합니다.</p>
  
  <button onclick="runMigration()">마이그레이션 실행</button>
  
  <div id="result"></div>
  
  <script>
    async function runMigration() {
      const resultDiv = document.getElementById('result');
      resultDiv.innerHTML = '<div class="result">⏳ 마이그레이션 실행 중...</div>';
      
      try {
        // Step 1: 새 랜딩페이지 생성 (자동 마이그레이션 트리거)
        const token = localStorage.getItem('token') || prompt('토큰을 입력하세요 (localStorage에서 자동 가져오기 실패):');
        
        if (!token) {
          resultDiv.innerHTML = '<div class="result error">❌ 토큰이 필요합니다. 먼저 로그인하세요.</div>';
          return;
        }
        
        resultDiv.innerHTML = '<div class="result">⏳ Step 1: 임시 랜딩페이지 생성 중...</div>';
        
        const createRes = await fetch('https://suplacestudy.com/api/admin/landing-pages', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            slug: 'migration-test-' + Date.now(),
            title: 'Migration Test (자동 삭제 예정)',
            subtitle: 'Test subtitle',
            thumbnail: 'https://via.placeholder.com/300',
            templateHtml: '<html><body><h1>{{title}}</h1><p>{{subtitle}}</p></body></html>',
            studentId: 'test-student'
          })
        });
        
        const createData = await createRes.json();
        
        if (createRes.ok && createData.success) {
          resultDiv.innerHTML = '<div class="result success">✅ Step 1 완료: 임시 랜딩페이지 생성 성공<br>ID: ' + createData.landingPageId + '</div>';
          
          // Step 2: 생성된 랜딩페이지 삭제
          if (createData.landingPageId) {
            resultDiv.innerHTML += '<div class="result">⏳ Step 2: 임시 랜딩페이지 삭제 중...</div>';
            
            const deleteRes = await fetch('https://suplacestudy.com/api/admin/landing-pages/' + createData.landingPageId, {
              method: 'DELETE',
              headers: {
                'Authorization': 'Bearer ' + token
              }
            });
            
            if (deleteRes.ok) {
              resultDiv.innerHTML += '<div class="result success">✅ Step 2 완료: 임시 랜딩페이지 삭제 성공</div>';
            } else {
              resultDiv.innerHTML += '<div class="result">⚠️ Step 2: 삭제 실패 (수동으로 삭제 필요)</div>';
            }
          }
          
          // Step 3: 테이블 구조 확인
          resultDiv.innerHTML += '<div class="result">⏳ Step 3: 테이블 구조 확인 중...</div>';
          
          const debugRes = await fetch('https://suplacestudy.com/api/admin/debug-landing-pages', {
            headers: {
              'Authorization': 'Bearer ' + token
            }
          });
          
          if (debugRes.ok) {
            const debugData = await debugRes.json();
            const columns = debugData.checks[0].columns.map(c => c.name);
            
            resultDiv.innerHTML += '<div class="result success">✅ Step 3 완료: 테이블 구조 확인<br><pre>' + JSON.stringify(columns, null, 2) + '</pre></div>';
            
            if (columns.includes('thumbnail_url') && columns.includes('subtitle')) {
              resultDiv.innerHTML += '<div class="result success"><h2>🎉 마이그레이션 완료!</h2><p>thumbnail_url과 subtitle 컬럼이 성공적으로 추가되었습니다.</p></div>';
            } else {
              resultDiv.innerHTML += '<div class="result error"><h2>❌ 마이그레이션 실패</h2><p>컬럼이 추가되지 않았습니다. 다시 시도하거나 개발자에게 문의하세요.</p></div>';
            }
          }
          
        } else {
          resultDiv.innerHTML = '<div class="result error">❌ Step 1 실패: ' + (createData.error || 'Unknown error') + '<br><pre>' + JSON.stringify(createData, null, 2) + '</pre></div>';
        }
        
      } catch (error) {
        resultDiv.innerHTML = '<div class="result error">❌ 오류 발생: ' + error.message + '</div>';
      }
    }
  </script>
</body>
</html>
