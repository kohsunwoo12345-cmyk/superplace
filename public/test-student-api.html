<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>학생 API 테스트</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1200px;
      margin: 50px auto;
      padding: 20px;
    }
    .test-section {
      margin: 20px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
    button {
      padding: 10px 20px;
      margin: 5px;
      cursor: pointer;
      background: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover {
      background: #0056b3;
    }
    .log {
      background: #f5f5f5;
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      max-height: 600px;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      white-space: pre-wrap;
    }
    .error { color: red; }
    .success { color: green; }
    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      box-sizing: border-box;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>
  <h1>🧪 학생 API 테스트</h1>
  
  <div class="test-section">
    <h2>1. 인증 정보 입력</h2>
    <label>토큰 (localStorage에서 자동 가져옴)</label>
    <input type="text" id="token" placeholder="Bearer token" readonly />
    <button onclick="loadToken()">토큰 로드</button>
  </div>

  <div class="test-section">
    <h2>2. 학생 목록 조회 (숙제 할당용)</h2>
    <button onclick="testStudentList()">학생 목록 조회 (/api/students)</button>
    <div id="studentList"></div>
  </div>

  <div class="test-section">
    <h2>3. 특정 학생 상세 조회</h2>
    <input type="text" id="studentId" placeholder="학생 ID 입력" />
    <button onclick="testStudentDetail()">상세 조회 (/api/students/by-academy)</button>
    <div id="studentDetail"></div>
  </div>

  <div class="test-section">
    <h2>로그</h2>
    <button onclick="clearLog()">로그 지우기</button>
    <div id="log" class="log"></div>
  </div>

  <script>
    function log(message, type = 'info') {
      const logDiv = document.getElementById('log');
      const timestamp = new Date().toLocaleTimeString();
      const className = type === 'error' ? 'error' : type === 'success' ? 'success' : '';
      logDiv.innerHTML += `<div class="${className}">[${timestamp}] ${message}</div>`;
      logDiv.scrollTop = logDiv.scrollHeight;
    }

    function clearLog() {
      document.getElementById('log').innerHTML = '';
    }

    function loadToken() {
      const token = localStorage.getItem('token');
      if (token) {
        document.getElementById('token').value = token;
        log('✅ 토큰 로드 성공', 'success');
      } else {
        log('❌ 토큰이 없습니다. 먼저 로그인하세요.', 'error');
      }
    }

    async function testStudentList() {
      const token = document.getElementById('token').value || localStorage.getItem('token');
      if (!token) {
        log('❌ 토큰이 필요합니다', 'error');
        return;
      }

      log('📡 학생 목록 조회 중...');

      try {
        const response = await fetch('/api/students', {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
        });

        log(`📥 응답 상태: ${response.status} ${response.statusText}`);

        if (response.ok) {
          const data = await response.json();
          log(`✅ 학생 목록 조회 성공`, 'success');
          log(`학생 수: ${data.students?.length || 0}명`);

          const listDiv = document.getElementById('studentList');
          if (data.students && data.students.length > 0) {
            let tableHTML = '<table><tr><th>ID</th><th>이름</th><th>이메일</th><th>학교</th><th>학년</th><th>반</th><th>소속 학원</th><th>상태</th></tr>';
            data.students.forEach(s => {
              tableHTML += `<tr>
                <td>${s.id}</td>
                <td>${s.name || '-'}</td>
                <td>${s.email || '-'}</td>
                <td>${s.school || '-'}</td>
                <td>${s.grade || '-'}</td>
                <td>${s.class || '-'}</td>
                <td>${s.academy_name || '-'}</td>
                <td>${s.status || 'ACTIVE'}</td>
              </tr>`;
            });
            tableHTML += '</table>';
            listDiv.innerHTML = tableHTML;
            
            log(`📊 상세 데이터: ${JSON.stringify(data.students[0], null, 2)}`);
          } else {
            listDiv.innerHTML = '<p>학생이 없습니다.</p>';
          }
        } else {
          const error = await response.json();
          log(`❌ API 오류: ${JSON.stringify(error)}`, 'error');
        }
      } catch (error) {
        log(`❌ 네트워크 오류: ${error.message}`, 'error');
      }
    }

    async function testStudentDetail() {
      const token = document.getElementById('token').value || localStorage.getItem('token');
      const studentId = document.getElementById('studentId').value;
      
      if (!token) {
        log('❌ 토큰이 필요합니다', 'error');
        return;
      }
      
      if (!studentId) {
        log('❌ 학생 ID를 입력하세요', 'error');
        return;
      }

      log(`📡 학생 상세 조회 중... (ID: ${studentId})`);

      try {
        const response = await fetch(`/api/students/by-academy?id=${studentId}`, {
          headers: {
            'Authorization': `Bearer ${token}`,
            'Content-Type': 'application/json',
          },
        });

        log(`📥 응답 상태: ${response.status} ${response.statusText}`);

        if (response.ok) {
          const data = await response.json();
          log(`✅ 학생 상세 조회 성공`, 'success');

          const detailDiv = document.getElementById('studentDetail');
          const student = data.student;
          
          if (student) {
            let html = '<table>';
            html += `<tr><th>필드</th><th>값</th></tr>`;
            html += `<tr><td>ID</td><td>${student.id}</td></tr>`;
            html += `<tr><td>이름</td><td>${student.name || '-'}</td></tr>`;
            html += `<tr><td>이메일</td><td>${student.email || '-'}</td></tr>`;
            html += `<tr><td>학교</td><td>${student.school || '-'}</td></tr>`;
            html += `<tr><td>학년</td><td>${student.grade || '-'}</td></tr>`;
            html += `<tr><td>반</td><td>${student.class || '-'}</td></tr>`;
            html += `<tr><td>소속 학원</td><td>${student.academyName || '-'}</td></tr>`;
            html += `<tr><td>배정된 반</td><td>${student.className || '-'}</td></tr>`;
            html += `<tr><td>반 ID</td><td>${student.classId || '-'}</td></tr>`;
            html += `<tr><td>상태</td><td>${student.status || 'ACTIVE'}</td></tr>`;
            html += '</table>';
            
            detailDiv.innerHTML = html;
            
            log(`📊 전체 데이터: ${JSON.stringify(student, null, 2)}`);
            
            if (student.classes && student.classes.length > 0) {
              log(`✅ 반 정보: ${student.classes.length}개`, 'success');
              student.classes.forEach((c, i) => {
                log(`  └─ 반 ${i+1}: ${c.className} (ID: ${c.classId})`);
              });
            } else {
              log('⚠️ 배정된 반 없음');
            }
          } else {
            detailDiv.innerHTML = '<p>학생 정보가 없습니다.</p>';
          }
        } else {
          const error = await response.json();
          log(`❌ API 오류: ${JSON.stringify(error)}`, 'error');
        }
      } catch (error) {
        log(`❌ 네트워크 오류: ${error.message}`, 'error');
      }
    }

    // 페이지 로드 시 자동으로 토큰 로드
    window.onload = () => {
      loadToken();
      log('✅ 테스트 페이지 준비 완료', 'success');
      log('1. 토큰 로드 버튼 클릭');
      log('2. 학생 목록 조회 버튼 클릭');
      log('3. 특정 학생 ID 입력 후 상세 조회');
    };
  </script>
</body>
</html>
